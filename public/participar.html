<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Participar — Nuvens Holandesas</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="participant-page">
    <main class="participant-shell">
      <header>
        <p class="eyebrow">Visitante</p>
        <h1>Escolha um objeto</h1>
        <p>escolha um objeto e insira-o na composição coletiva.</p>
      </header>

      <section class="panel object-choice" aria-label="Escolha de objeto">
        <p class="rule-note">cada objeto entra na cena segundo regras de posição e convivência.</p>
        <div class="object-cards" id="objectCards"></div>
        <div class="meta"><span id="choiceLabel">nenhum objeto escolhido</span><span id="status">conectando…</span></div>
      </section>

      <section class="panel controls" id="controlPanel" aria-label="Controles do objeto" hidden>
        <label>posição horizontal <input id="x" type="range" min="0" max="1" step="0.01" value="0.5" /></label>
        <label>altura / faixa vertical <input id="y" type="range" min="0" max="1" step="0.01" value="0.74" /></label>
        <label>escala <input id="scale" type="range" min="0.34" max="1.28" step="0.01" value="0.78" /></label>
        <label>rotação <input id="rotation" type="range" min="-24" max="24" step="1" value="0" /></label>
        <label>intensidade <input id="opacity" type="range" min="0.45" max="0.96" step="0.01" value="0.82" /></label>
        <button id="createObject" class="button primary" type="button">Inserir objeto</button>
      </section>
    </main>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/shared.js"></script>
    <script src="/js/participant.js"></script>
  </body>
</html>
